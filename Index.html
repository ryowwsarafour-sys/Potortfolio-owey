<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Romantic Aesthetic</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#050505;font-family:'Outfit',sans-serif;height:100vh;perspective:1200px}

/* LOADING */
#loading{
  position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  flex-direction:column;background:#050505;z-index:999;
  transition:opacity 1.5s ease,filter 1.5s ease,transform 1.5s ease;
  gap:16px;
}
#loading.out{opacity:0;filter:blur(16px);transform:scale(1.06);pointer-events:none}
.loading-text{color:#ff6eb4;letter-spacing:10px;font-weight:100;font-size:13px;text-shadow:0 0 12px #ff6eb4}
.load-icon{font-size:30px;color:#ff6eb4;filter:drop-shadow(0 0 8px #ff6eb4);animation:loadIconPulse 1.5s ease-in-out infinite}
@keyframes loadIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.bar{width:180px;height:1px;background:#1a1a1a;overflow:hidden}
.bar span{display:block;height:100%;width:0%;background:#ff6eb4;animation:load 4.2s forwards;box-shadow:0 0 8px #ff6eb4}
@keyframes load{to{width:100%}}
.load-dots{display:flex;gap:8px}
.load-dots span{width:4px;height:4px;border-radius:50%;background:#ff6eb4;animation:dotb 1.2s ease-in-out infinite}
.load-dots span:nth-child(2){animation-delay:.2s}
.load-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotb{0%,100%{opacity:.2;transform:scale(.8)}50%{opacity:1;transform:scale(1.3)}}

/* SCENE */
#scene{position:fixed;inset:0;opacity:0;transition:opacity 1.5s ease;transform-style:preserve-3d}
#scene.visible{opacity:1}
#bg{position:absolute;inset:0;background:#050505}
#vignette{position:absolute;inset:0;background:radial-gradient(ellipse at center,transparent 40%,rgba(0,0,5,.78) 100%);pointer-events:none;z-index:5}

/* Rain text */
.text{
  position:absolute;font-weight:100;white-space:nowrap;
  animation:fall3d linear infinite;
  pointer-events:none;z-index:2;
  transition:color 1.5s ease, text-shadow 1.5s ease;
}
@keyframes fall3d{
  from{transform:translateY(-100px) translateZ(var(--tz)) rotateY(var(--ry))}
  to{transform:translateY(115vh) translateZ(var(--tz)) rotateY(var(--ry))}
}

/* Photo rain */
.photo{
  position:absolute;border-radius:16px;overflow:hidden;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.14);
  animation:fall3d linear infinite;
  z-index:3;
  transition:box-shadow 1.5s ease, border-color 1.5s ease;
}
.photo:hover{transform:scale(1.25)!important}
.photo img{width:100%;height:100%;object-fit:cover}

/* MUSIC BTN */
#musicBtn{
  position:fixed;bottom:18px;right:18px;z-index:100;
  width:36px;height:36px;border-radius:50%;
  background:rgba(5,5,5,.7);
  border:1px solid rgba(255,110,180,.4);
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;
  box-shadow:0 0 12px rgba(255,110,180,.25);
  transition:color 1.5s ease, border-color 1.5s ease, box-shadow 1.5s ease, transform .2s;
}
#musicBtn:hover{transform:scale(1.12)}

/* Music panel */
#musicPanel{
  position:fixed;bottom:62px;right:18px;z-index:100;
  background:rgba(5,5,5,.75);
  border:1px solid rgba(255,110,180,.25);
  border-radius:16px;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:9px;
  box-shadow:0 0 20px rgba(255,110,180,.15);
  opacity:0;pointer-events:none;
  transform:translateY(8px);
  transition:opacity .25s ease,transform .25s ease;
  min-width:150px;
}
#musicPanel.open{opacity:1;pointer-events:all;transform:translateY(0)}
.panel-label{font-size:8px;letter-spacing:4px;color:rgba(255,255,255,.25);font-weight:100;display:flex;align-items:center;gap:6px}
.panel-label i{font-size:9px}
.panel-btns{display:flex;gap:7px;align-items:center}
.pbtn{
  width:28px;height:28px;border-radius:50%;
  border:1px solid rgba(255,110,180,.35);
  background:rgba(255,110,180,.08);
  color:#ff6eb4;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;transition:all .2s;
}
.pbtn:hover{background:rgba(255,110,180,.24);box-shadow:0 0 10px rgba(255,110,180,.5);transform:scale(1.1)}
.vol-row{display:flex;align-items:center;gap:6px}
.vol-row i{font-size:9px;color:rgba(255,255,255,.3)}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  flex:1;height:1.5px;border-radius:2px;outline:none;cursor:pointer;
  background:rgba(255,110,180,.4);
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:9px;height:9px;border-radius:50%;
  background:#fff;cursor:pointer;
}
</style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="load-icon"><i class="fa-solid fa-heart"></i></div>
  <div class="loading-text">LOADING MEMORIES</div>
  <div class="bar"><span></span></div>
  <div class="load-dots"><span></span><span></span><span></span></div>
</div>

<!-- SCENE -->
<div id="scene">
  <div id="bg"></div>
  <div id="vignette"></div>
</div>

<!-- MUSIC BUTTON -->
<div id="musicBtn" title="Music"><i class="fa-solid fa-music" id="musicIcon"></i></div>

<!-- MUSIC PANEL -->
<div id="musicPanel">
  <div class="panel-label"><i class="fa-solid fa-music"></i> NOW PLAYING</div>
  <div class="panel-btns">
    <button class="pbtn" id="btnPlay"><i class="fa-solid fa-play" id="playIcon"></i></button>
    <button class="pbtn" id="btnMute"><i class="fa-solid fa-volume-high" id="muteIcon"></i></button>
    <button class="pbtn" id="btnLoop"><i class="fa-solid fa-repeat"></i></button>
  </div>
  <div class="vol-row">
    <i class="fa-solid fa-volume-low"></i>
    <input type="range" id="volSlider" min="0" max="100" value="50">
    <i class="fa-solid fa-volume-high"></i>
  </div>
</div>

<audio id="bgAudio" loop>
  <source src="Song.mp3" type="audio/mp3">
</audio>

<script>
const MESSAGES = [
  "i love you","i miss you","thinking of u","my favorite person",
  "forever","love u more","always with you","you are enough",
  "my safe place","you mean everything","always on my mind",
  "stay with me","only you","my heart is yours"
];
const PHOTOS = [
  "Ciaa.jpg",
  "Sifa.jpg",
  "Sita.jpg",
];

/* ── WARNA GLOBAL — ganti satu per satu, semua elemen bareng ── */
const COLORS = [
  "#ffffff",
  "#ffe4ef",
  "#ffb6d5",
  "#ff6eb4",
  "#ff2d78",
  "#ff1744",
  "#00e5ff",
  "#d500f9",
];
let currentColor = 0;

function applyGlobalColor() {
  const color = COLORS[currentColor];
  // parse hex ke rgb untuk shadow
  const r = parseInt(color.slice(1,3),16)||255;
  const g = parseInt(color.slice(3,5),16)||110;
  const b = parseInt(color.slice(5,7),16)||180;

  document.querySelectorAll('.text').forEach(el => {
    el.style.color = color;
    el.style.textShadow = `0 0 8px ${color}`;
  });
  document.querySelectorAll('.photo').forEach(el => {
    el.style.borderColor = color + '55';
    el.style.boxShadow = `0 0 14px ${color}44`;
  });
  const btn = document.getElementById('musicBtn');
  btn.style.color = color;
  btn.style.borderColor = `rgba(${r},${g},${b},.45)`;
  btn.style.boxShadow = `0 0 12px rgba(${r},${g},${b},.28)`;

  // bg glow ikut warna
  document.getElementById('bg').style.background =
    `radial-gradient(ellipse 70% 60% at 30% 40%,rgba(${r},${g},${b},.1),transparent),` +
    `radial-gradient(ellipse 50% 70% at 70% 60%,rgba(${r},${g},${b},.06),transparent),#050505`;
}

setInterval(() => {
  currentColor = (currentColor + 1) % COLORS.length;
  applyGlobalColor();
}, 3000);

/* ── LOADING ── */
setTimeout(() => {
  document.getElementById('loading').classList.add('out');
  document.getElementById('scene').classList.add('visible');
  setTimeout(() => document.getElementById('loading').remove(), 1600);
  bgAudio.volume = 0.5;
  bgAudio.play().catch(() => {});
  applyGlobalColor();
}, 4400);

/* ── RAIN TEXT (60) ── */
for (let i = 0; i < 60; i++) {
  const el = document.createElement('div');
  el.className = 'text';
  el.innerText = MESSAGES[Math.floor(Math.random() * MESSAGES.length)];
  const depth = Math.random();
  const sz = 9 + depth * 18;
  el.style.cssText = `
    left:${Math.random()*105}vw;
    font-size:${sz}px;
    opacity:${0.1 + depth * 0.5};
    color:#ff6eb4;
    animation-duration:${10+Math.random()*22}s;
    animation-delay:${-Math.random()*30}s;
    --tz:${depth*200-80}px;
    --ry:${(Math.random()-.5)*28}deg;
    filter:none;
  `;
  document.body.appendChild(el);
}

/* ── PHOTO RAIN (8) ── */
for (let i = 0; i < 8; i++) {
  const el = document.createElement('div');
  el.className = 'photo';
  const depth = Math.random();
  const sz = 65 + depth * 65;
  el.style.cssText = `
    width:${sz}px;height:${sz}px;
    left:${Math.random()*100}vw;
    opacity:${0.3+depth*0.5};
    animation-duration:${16+Math.random()*22}s;
    animation-delay:${-Math.random()*25}s;
    --tz:${depth*160-60}px;
    --ry:${(Math.random()-.5)*30}deg;
  `;
  const img = document.createElement('img');
  img.src = PHOTOS[i % PHOTOS.length];
  img.loading = 'lazy';
  el.appendChild(img);
  document.body.appendChild(el);
}

/* ── MOUSE PARALLAX ── */
let tx = 0, ty = 0;
document.addEventListener('mousemove', e => {
  tx = (e.clientX / innerWidth - .5) * 20;
  ty = (e.clientY / innerHeight - .5) * 12;
});
(function loop() {
  const sc = document.getElementById('scene');
  if (sc) sc.style.transform = `rotateY(${tx*.18}deg) rotateX(${-ty*.12}deg) translate(${tx*.4}px,${ty*.25}px)`;
  requestAnimationFrame(loop);
})();

/* ── MUSIC PANEL toggle ── */
let panelOpen = false;
const musicBtn = document.getElementById('musicBtn');
musicBtn.addEventListener('click', () => {
  panelOpen = !panelOpen;
  document.getElementById('musicPanel').classList.toggle('open', panelOpen);
  document.getElementById('musicIcon').className = panelOpen ? 'fa-solid fa-xmark' : 'fa-solid fa-music';
});
document.addEventListener('click', e => {
  if (panelOpen && !musicBtn.contains(e.target) && !document.getElementById('musicPanel').contains(e.target)) {
    panelOpen = false;
    document.getElementById('musicPanel').classList.remove('open');
    document.getElementById('musicIcon').className = 'fa-solid fa-music';
  }
});

/* ── MUSIC CONTROLS ── */
const audio = document.getElementById('bgAudio');
let isPlaying = false, isMuted = false;

document.getElementById('btnPlay').addEventListener('click', () => {
  if (isPlaying) { audio.pause(); document.getElementById('playIcon').className = 'fa-solid fa-play'; }
  else { audio.play().catch(()=>{}); document.getElementById('playIcon').className = 'fa-solid fa-pause'; }
  isPlaying = !isPlaying;
});
document.getElementById('btnMute').addEventListener('click', () => {
  isMuted = !isMuted;
  audio.muted = isMuted;
  document.getElementById('muteIcon').className = isMuted ? 'fa-solid fa-volume-xmark' : 'fa-solid fa-volume-high';
});
document.getElementById('btnLoop').addEventListener('click', function() {
  audio.loop = !audio.loop;
  this.style.opacity = audio.loop ? '1' : '0.4';
});
document.getElementById('volSlider').addEventListener('input', function() {
  audio.volume = this.value / 100;
  if (audio.volume > 0 && isMuted) { isMuted = false; audio.muted = false; document.getElementById('muteIcon').className = 'fa-solid fa-volume-high'; }
});
audio.addEventListener('play', () => { isPlaying = true; document.getElementById('playIcon').className = 'fa-solid fa-pause'; });
audio.addEventListener('pause', () => { isPlaying = false; document.getElementById('playIcon').className = 'fa-solid fa-play'; });
</script>
</body>
</html>
